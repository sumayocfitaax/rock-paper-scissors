<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="./style/style.css" />
  </head>

  <body>
    <p class="title">Rock Paper Scissors</p>
    <button onclick="playGame('Rock')" class="move-button">
      <img src="img/rock-emoji.png" class="move-icon" />
    </button>

    <button onclick="playGame('Paper')" class="move-button">
      <img src="img/paper-emoji.png" class="move-icon" />
    </button>

    <button onclick="playGame('Scissors')" class="move-button">
      <img src="img/scissors-emoji.png" class="move-icon" />
    </button>

    <p class="js-result"></p>
    <p class="js-moves"></p>
    <p class="js-score"></p>

    <button
      onclick="
        score.win = 0;
        score.loses = 0;
        score.tie = 0;

        localStorage.removeItem('score');
        updateScoreElement();
      "
      class="reset-button"
    >
      reset score
    </button>

    <script src="js/rock-paper-scissor.js"></script>
  </body>
</html>
